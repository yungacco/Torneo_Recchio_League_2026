<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Overlay - Recchio League</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #d32f2f;
    --surface: #141417;
    --border: #2c2c35;
    --text: #ffffff;
    --red: #ff1744;
  }

  body {
    margin: 0; padding: 0;
    background-color: transparent !important; 
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding-top: 40px; 
    overflow: hidden;
  }

  #scoreboard-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
    transform: translateY(-20px);
    filter: drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.7));
    position: relative;
  }

  #scoreboard-container.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .status-badge {
    background: var(--red);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 4px 16px;
    border-radius: 8px 8px 0 0;
    text-transform: uppercase;
    letter-spacing: 1px;
    animation: pulse 2s infinite;
  }

  .main-board {
    display: flex;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    height: 60px;
    z-index: 2;
  }

  .team {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    padding: 0 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 200px;
  }

  .team.left { text-align: right; justify-content: flex-end; }
  .team.right { text-align: left; justify-content: flex-start; }

  .score-box {
    background: var(--green);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 100px;
    transition: all 0.3s ease;
  }

  .score-box.goal { transform: scale(1.1); background: #ffffff; color: var(--green); }

  .info-bar {
    background: rgba(20, 20, 23, 0.9);
    border: 1px solid var(--border);
    border-top: none;
    padding: 4px 15px;
    border-radius: 0 0 8px 8px;
    font-size: 12px;
    color: #a0a0ab;
    font-weight: 600;
    text-transform: uppercase;
    z-index: 1;
  }

  /* BANNER DINAMICO PER GLI EVENTI (Preset) */
  #event-banner {
    position: absolute;
    top: 90px; /* Sotto la scoreboard */
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 1px;
    padding: 6px 30px;
    border-radius: 8px;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateY(-30px) scale(0.9);
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    white-space: nowrap;
    z-index: 0;
  }

  #event-banner.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div id="scoreboard-container">
  <div class="status-badge" id="match-status">🔴 LIVE</div>
  <div class="main-board">
    <div class="team left" id="teamA">SQUADRA A</div>
    <div class="score-box" id="score-box">
      <span id="scoreA">0</span><span style="margin: 0 8px;">-</span><span id="scoreB">0</span>
    </div>
    <div class="team right" id="teamB">SQUADRA B</div>
  </div>
  <div class="info-bar" id="match-info">GIRONE A</div>
  
  <div id="event-banner">TESTO EVENTO</div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwZ4xDW77psti5npx53UaKu614s5vgXlvy6Uqxk6pWKv8DR6KGcmYwMK8e5bKCKl9sL/exec";
  
  let currentGolA = -1;
  let currentGolB = -1;
  let lastEventTriggered = ""; // Memoria dell'ultimo preset attivato

  async function fetchLiveMatch() {
    try {
      const response = await fetch(API_URL + "?action=getAllMatches");
      const data = await response.json();
      
      if (data.success && data.matches) {
        const liveMatch = data.matches.find(m => m.status === 'LIVE');
        if (liveMatch) updateScoreboard(liveMatch);
        else hideScoreboard();
      }
    } catch (error) {
      console.error("Errore fetch dati OBS:", error);
    }
  }

  function updateScoreboard(match) {
    const container = document.getElementById('scoreboard-container');
    const scoreBox = document.getElementById('score-box');
    
    document.getElementById('teamA').textContent = match.squadraA;
    document.getElementById('teamB').textContent = match.squadraB;
    
    let infoTesto = ['A', 'B', 'C', 'D'].includes(match.girone) ? `GIRONE ${match.girone}` : match.girone;
    document.getElementById('match-info').textContent = infoTesto;

    let newGolA = parseInt(match.golA) || 0;
    let newGolB = parseInt(match.golB) || 0;

    if (currentGolA !== -1 && (newGolA !== currentGolA || newGolB !== currentGolB)) {
      scoreBox.classList.add('goal');
      setTimeout(() => scoreBox.classList.remove('goal'), 500);
    }

    document.getElementById('scoreA').textContent = newGolA;
    document.getElementById('scoreB').textContent = newGolB;
    currentGolA = newGolA; currentGolB = newGolB;

    // MAGIA DEGLI EVENTI
    // Se è stato registrato un nuovo evento...
    if (match.evento && match.evento !== lastEventTriggered) {
      lastEventTriggered = match.evento;
      
      // Estraiamo TESTO | SFONDO | COLORE
      const parts = match.evento.split('|');
      if (parts.length >= 3) {
        const banner = document.getElementById('event-banner');
        banner.textContent = parts[0];
        banner.style.backgroundColor = parts[1];
        banner.style.color = parts[2];
        
        // Animazione in entrata
        banner.classList.add('show');

        // Scompare da solo dopo 8 secondi
        setTimeout(() => {
          banner.classList.remove('show');
        }, 8000);
      }
    }

    container.classList.add('visible');
  }

  function hideScoreboard() {
    document.getElementById('scoreboard-container').classList.remove('visible');
    currentGolA = -1; currentGolB = -1;
  }

  fetchLiveMatch();
  // Poll rapido per l'interattività live (ogni 3 secondi)
  setInterval(fetchLiveMatch, 3000);
</script>

</body>
</html>
